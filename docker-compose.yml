
---

### 📄 `docker-compose.yml`
```yaml
version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: workpulse-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: workpulse-ai
    networks:
      - workpulse-network

  redis:
    image: redis:7-alpine
    container_name: workpulse-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - workpulse-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: workpulse-server
    restart: always
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
      - redis
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: mongodb://mongodb:27017/workpulse-ai
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLIENT_URL: ${CLIENT_URL}
    networks:
      - workpulse-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: workpulse-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - workpulse-network

volumes:
  mongodb_data:
  redis_data:

networks:
  workpulse-network:
    driver: bridge
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        run: echo "Deploy backend to Render.com via webhook"
        # Add your Render deploy hook URL here

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        working-directory: ./client
        run: |
          npm ci
          npm run build
      - name: Deploy to Vercel
        run: echo "Deploy frontend to Vercel"
        # Add vercel deploy command here